<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Signup | CLOCHE</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#c1a671",
            "background-light": "#f7f6f2",
            "background-dark": "#0d0d0d",
            "cloche-gold": "#c1a671",
            "cloche-dark": "#1e1b15",
            "cloche-glass": "rgba(44, 40, 32, 0.6)",
          },
          fontFamily: {
            "display": ["Noto Serif", "serif"],
            "sans": ["Noto Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: "Noto Sans", sans-serif; }
    .font-display { font-family: "Noto Serif", serif; }
    .luxury-bg {
      background:
        radial-gradient(circle at 70% 30%, rgba(193, 166, 113, 0.18), rgba(13, 13, 13, 0.95) 55%),
        radial-gradient(circle at 25% 75%, rgba(193, 166, 113, 0.12), rgba(13, 13, 13, 0.9) 60%),
        linear-gradient(180deg, #0d0d0d 0%, #0b0b0b 100%);
    }
    .glass-card {
      background: rgba(30, 27, 21, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(193, 166, 113, 0.2);
    }
  </style>
  <link rel='stylesheet' href='responsive-fixes.css' />
</head>

<body class="luxury-bg min-h-screen flex flex-col relative overflow-x-hidden text-white pt-24">
  <nav class="fixed top-0 w-full z-50">
    <div class="bg-[rgba(26,26,26,0.6)] backdrop-blur-md border-b border-[rgba(193,166,113,0.2)]">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 group">
          <span class="material-symbols-outlined text-primary text-3xl group-hover:scale-105 transition-transform">diamond</span>
          <span class="text-2xl font-display font-bold tracking-[0.2em] text-white group-hover:text-primary transition-colors">CLOCHE</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full flex flex-col items-center justify-center px-4 py-12 z-10">
    <div class="glass-card w-full max-w-[600px] p-8 md:p-12 rounded-xl shadow-2xl">
      <div class="text-center mb-10">
        <h1 class="text-white font-display tracking-[0.1em] text-[28px] md:text-[36px] font-bold leading-tight pb-3">JOIN THE CIRCLE</h1>
        <p id="signupSubtitle" class="text-white/60 text-sm md:text-base font-light italic">Begin your journey as an esteemed luxury partner.</p>
      </div>

      <div class="mb-6">
        <p class="text-primary/80 text-xs font-bold uppercase tracking-widest mb-3">I am signing up as</p>
        <div class="grid grid-cols-2 gap-3">
          <button id="userTypeBtn" type="button" class="h-12 rounded-lg border border-white/10 bg-white/5 text-white/80 text-xs font-bold uppercase tracking-[0.12em]">User</button>
          <button id="partnerTypeBtn" type="button" class="h-12 rounded-lg border border-primary/40 bg-primary/10 text-primary text-xs font-bold uppercase tracking-[0.12em]">Partner</button>
        </div>
      </div>

      <form id="signupForm" class="flex flex-col gap-6">
        <div id="partnerBoutiqueWrap" class="flex flex-col gap-2">
          <label class="text-primary/80 text-xs font-bold uppercase tracking-widest">Boutique Name</label>
          <input id="boutique" type="text" placeholder="The Atelier London" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label id="nameLabel" class="text-primary/80 text-xs font-bold uppercase tracking-widest">Owner Name</label>
            <input id="owner" type="text" placeholder="Julianne Vaught" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4" />
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-primary/80 text-xs font-bold uppercase tracking-widest">Email Address</label>
            <input id="email" type="email" placeholder="concierge@atelier.com" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4" />
          </div>
        </div>
        
        <div id="partnerPhoneCityWrap" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-primary/80 text-xs font-bold uppercase tracking-widest">Mobile Number</label>
            <input id="phone" type="tel" placeholder="8606924541" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4 focus:border-primary focus:ring-0" />
          </div>
          <div id="partnerCityWrap" class="flex flex-col gap-2">
            <label class="text-primary/80 text-xs font-bold uppercase tracking-widest">City</label>
            <input id="city" type="text" placeholder="Enter City" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4 focus:border-primary focus:ring-0" />
          </div>
        </div>

        <div class="flex flex-col gap-2 relative">
          <label class="text-primary/80 text-xs font-bold uppercase tracking-widest">Secure Password</label>
          <input id="password" type="password" placeholder="••••••••••••" class="w-full rounded-lg text-white border border-white/10 bg-white/5 h-14 px-4" />
          <button type="button" onclick="togglePassword('password', this)" class="absolute right-2 bottom-2 p-2 rounded-full text-white/30 hover:text-primary hover:bg-white/5 transition">
            <span class="material-symbols-outlined text-sm">visibility</span>
          </button>
        </div>

        <div class="mt-4">
          <button id="signupSubmitBtn" class="w-full bg-primary hover:bg-[#d4b984] text-cloche-dark h-14 rounded-lg font-bold text-sm uppercase tracking-[0.2em] shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
            Create Boutique Account
          </button>
        </div>
      </form>

      <div class="mt-12 pt-8 border-t border-white/5 flex flex-wrap justify-center gap-8 md:gap-12">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined text-primary text-xl">verified_user</span>
          <div class="text-left">
            <p class="text-white text-[10px] font-bold uppercase tracking-widest leading-none">Zero Commission</p>
            <p class="text-white/40 text-[9px] uppercase tracking-tighter">Onboarding phase</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined text-primary text-xl">diamond</span>
          <div class="text-left">
            <p class="text-white text-[10px] font-bold uppercase tracking-widest leading-none">Global Access</p>
            <p class="text-white/40 text-[9px] uppercase tracking-tighter">Premium Marketplace</p>
          </div>
        </div>
      </div>
      <p class="mt-8 text-center text-white/40 text-xs font-light">Already a partner? <a class="text-primary font-medium hover:underline ml-1" href="boutiquelogin.html">Sign In</a></p>
    </div>
  </main>

  <footer class="w-full max-w-[1200px] px-8 py-10 flex flex-col md:flex-row justify-between items-center gap-6 z-10 border-t border-white/5 mx-auto">
    <p class="text-white/30 text-[10px] uppercase tracking-[0.3em]">© 2024 CLOCHE COLLECTIVE. ALL RIGHTS RESERVED.</p>
    <div class="flex gap-8">
      <a class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors" href="#">Privacy</a>
      <a class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors" href="#">Terms</a>
      <a class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors" href="#">Help</a>
    </div>
  </footer>

  <script>
    const API_BASE = "https://cloche-backend.onrender.com";
    let selectedAccountType = "partner";

    function setAccountType(type) {
      selectedAccountType = type === "user" ? "user" : "partner";
      const isUser = selectedAccountType === "user";
      
      document.getElementById("partnerBoutiqueWrap").style.display = isUser ? "none" : "flex";
      document.getElementById("partnerPhoneCityWrap").style.display = isUser ? "none" : "grid";
      document.getElementById("nameLabel").textContent = isUser ? "Name" : "Owner Name";
      document.getElementById("owner").placeholder = isUser ? "Your Full Name" : "Julianne Vaught";
      document.getElementById("signupSubtitle").textContent = isUser ? "Create your user account in a few steps." : "Begin your journey as an esteemed luxury partner.";
      document.getElementById("signupSubmitBtn").textContent = isUser ? "Create User Account" : "Create Boutique Account";
      
      document.getElementById("userTypeBtn").className = isUser ? "h-12 rounded-lg border border-primary/40 bg-primary/10 text-primary text-xs font-bold uppercase tracking-[0.12em]" : "h-12 rounded-lg border border-white/10 bg-white/5 text-white/80 text-xs font-bold uppercase tracking-[0.12em]";
      document.getElementById("partnerTypeBtn").className = isUser ? "h-12 rounded-lg border border-white/10 bg-white/5 text-white/80 text-xs font-bold uppercase tracking-[0.12em]" : "h-12 rounded-lg border border-primary/40 bg-primary/10 text-primary text-xs font-bold uppercase tracking-[0.12em]";
    }

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      let data = null;
      if (selectedAccountType === "user") {
        data = {
          account_type: "user",
          name: document.getElementById("owner").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        };
      } else {
        data = {
          account_type: "partner",
          boutique_name: document.getElementById("boutique").value.trim(),
          owner_name: document.getElementById("owner").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          city: document.getElementById("city").value.trim(),
          password: document.getElementById("password").value
        };
      }

      if (!data.email.toLowerCase().endsWith("@gmail.com")) {
        alert("Only Gmail addresses are accepted for authentication."); return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/signup`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
          alert("Signup successful! A verification email has been sent to your Gmail.");
          window.location.href = "boutiquelogin.html?status=verification_sent";
        } else {
          alert(result.message);
        }
      } catch (err) { alert("Server error"); }
    });

    document.getElementById("userTypeBtn").addEventListener("click", () => setAccountType("user"));
    document.getElementById("partnerTypeBtn").addEventListener("click", () => setAccountType("partner"));
    setAccountType("partner");

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector("span");
      if (input.type === "password") { input.type = "text"; icon.textContent = "visibility_off"; }
      else { input.type = "password"; icon.textContent = "visibility"; }
    }
  </script>
  <script src='responsive-layout.js'></script>
</body>
</html>
